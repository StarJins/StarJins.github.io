<!DOCTYPE html>
<html>
    <head>
        <title>StarJins's Homepage</title>
        <style>

            body {
                font-family: "맑은 고딕", sans-serif;
                font-size: 20px;
                font-weight: bold;
                background-color: #f7f7f7;
            }
            #allContent {
                width: 1200px;
                margin-left: auto;
                margin-right: auto;
            }

            /* 홈페이지 타이틀 */
            #logo a {
                text-decoration: none;
                color: black;
            }
            #title {
                text-align: center;
                margin: 0px;
                margin-bottom: 10px;
                font-size: 50px;
            }

            /* 네비게이션 메뉴 */
            #mainMenu {
                line-height: 40px;
            }
            ul {
                list-style: none;
                margin: 0px;
                padding: 0px;
                background-color: #2d2d2d;
            }
            ul.navi li {
                display: inline;
                padding: 0px;
                margin: 0px;
            }
            ul.navi li a {
                color: white;
                text-decoration: none;
                padding-top: 6px;       /* hover시 배경색을 알맞게 변경하기 위해 padding 설정 */
                padding-bottom: 6px;
                padding-left: 74px;
                padding-right: 75px;
                margin: 0px;
            }
            ul.navi li:hover a {
                color: white;
                background-color: #4d4d4d;
            }
            ul.navi ul {
                display: none;
                position: absolute;
                background-color: #4d4d4d;
                width: 1200px;
            }
            ul.navi li:hover ul {
                display: block;
            }
            ul.navi li ul li a {
                color: white;
                background-color: #4d4d4d;
            }
            ul.navi li ul li:hover a {
                color: black;
                background-color: #D8D8D8;
            }

            /* 본문 */
            #main {
                margin-top: 40px;
                text-align: center;
            }
            #main table {
                border-spacing: 30px;
                margin-left: auto;
                margin-right: auto;
            }
            #main table tr.image td {
                background-color: #E6E6E6;
                border-radius: 100%;
                width: 250px;
                height: 250px;
            }
            #main img {
                width: 130px;
                height: 130px;
                border-radius: 20px;
                transition: height .2s, width .2s;
            }
            #main a:hover img {
                width: 150px;
                height: 150px;
            }

            /* 페이지 아래 표시 */
            #bottom {
                font-size: small;
                position: absolute;
                bottom: 0%;
            }

        </style>
    </head>
