      #allContent {

      /* 홈페이지 타이틀 */
      #logo a {

        list-style: none;

        padding: 0px;

      ul.navi li a {
        color: white;
        text-decoration: none;

        padding-left: 74px;
        padding-right: 75px;
        margin: 0px;
      }
      ul.navi li:hover a {
        color: white;
        background-color: #4d4d4d;
      }
      ul.navi ul {
        display: none;
        position: absolute;
        background-color: #4d4d4d;
        width: 1200px;
      }
      ul.navi li:hover ul {
        display: block;
      }
      ul.navi li ul li a {
        color: white;
        background-color: #4d4d4d;
      }
      ul.navi li ul li:hover a {
        color: black;
        background-color: #D8D8D8;
      }

      #main {

        background-color: #E6E6E6;
        border-radius: 10px;
      }
      #main img {

          height: 200px;
      }
      #main table td {
          padding-top: 10px;
          padding-bottom: 10px;
          padding-left: 10px;
      }
      #main a {
          text-decoration: none;
          color: blue;
      }
      #image {
          padding-right: 20px;
      }

      /* 페이지 아래 표시 */
      #bottom {
        font-size: small;
        position: absolute;
        bottom: 0%;
